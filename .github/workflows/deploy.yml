name: Deploy verified Edge version

on:
  workflow_run:
    workflows: ["Verify immutable Edge bundle"]
    types: [completed]

concurrency:
  group: oz-erp-edge-production
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

jobs:
  deploy:
    if:
      github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch ==
      'main'
    runs-on: ubuntu-24.04
    environment: production
    timeout-minutes: 10
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Download exact verified bundle
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          SHA: ${{ github.event.workflow_run.head_sha }}
        run:
          gh run download "$RUN_ID" --repo "$GITHUB_REPOSITORY" --name "edge-bundle-$SHA" --dir
          artifact
      - name: Validate artifact identity
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          test "$(jq -r .sha artifact/edge-artifact.json)" = "$SHA"
          test -s artifact/index.js
          test -s artifact/wrangler.jsonc
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Install pinned deployment client only
        run: npm install --global wrangler@4.110.0
      - name: Upload prebuilt version at zero traffic
        id: upload
        working-directory: artifact
        run: |
          set -euo pipefail
          version="$(jq -r .version edge-artifact.json)"
          wrangler versions upload index.js --no-bundle --config wrangler.jsonc --tag "$version" --strict
          versions="$(wrangler versions list --name oz-erp-edge --json)"
          id="$(jq -r --arg tag "$version" '[.[] | select((.tag // .metadata.tag // .annotations["workers/tag"]) == $tag)][0].id // empty' <<< "$versions")"
          [[ "$id" =~ ^[0-9a-f-]{36}$ ]]
          echo "version_id=$id" >> "$GITHUB_OUTPUT"
      - name: Verify with version override and promote
        env:
          NEW_VERSION: ${{ steps.upload.outputs.version_id }}
        run: |
          set -euo pipefail
          current_json="$(wrangler deployments status --name oz-erp-edge --json)"
          OLD_VERSION="$(jq -r '.versions | max_by(.percentage) | .version_id' <<< "$current_json")"
          rollback() { wrangler versions deploy "$OLD_VERSION@100%" --name oz-erp-edge -y; }
          trap rollback ERR
          wrangler versions deploy "$OLD_VERSION@100%" "$NEW_VERSION@0%" --name oz-erp-edge -y
          curl --fail --silent --show-error --retry 3 -H "Cloudflare-Workers-Version-Overrides: oz-erp-edge=$NEW_VERSION" https://api.erp.ozotecev.com/livez >/dev/null
          for percent in 5 25 100; do
            old=$((100-percent))
            if [[ "$percent" -eq 100 ]]; then
              wrangler versions deploy "$NEW_VERSION@100%" --name oz-erp-edge -y
            else
              wrangler versions deploy "$OLD_VERSION@$old%" "$NEW_VERSION@$percent%" --name oz-erp-edge -y
            fi
            curl --fail --silent --show-error --retry 3 https://api.erp.ozotecev.com/livez >/dev/null
          done
          trap - ERR
