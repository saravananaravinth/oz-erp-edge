name: Verify immutable Edge bundle

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: edge-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Repository policy
        run: |
          set -euo pipefail
          test ! -d tests
          test ! -f vitest.config.ts
          ! jq -e '.devDependencies.vitest // .dependencies.vitest' package.json >/dev/null
          test -f wrangler.jsonc
          test ! -f wrangler.toml
          if git grep -nE '^-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----$' -- ':!package-lock.json'; then
            echo 'Potential plaintext secret found in tracked files.' >&2
            exit 1
          fi
      - run: npm run verify
      - run: npm run cf:startup
      - name: Record verified bundle
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          jq -n --arg sha "$GITHUB_SHA" --arg version "0.1.0+${GITHUB_SHA:0:12}" '{sha:$sha,version:$version}' > dist/edge-artifact.json
          cp wrangler.jsonc dist/wrangler.jsonc
      - if: github.event_name == 'push'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: edge-bundle-${{ github.sha }}
          path: dist
          retention-days: 30
          if-no-files-found: error
