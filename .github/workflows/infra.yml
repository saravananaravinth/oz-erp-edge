name: Rotate Edge Cloud Run invocation credential

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 1"

concurrency:
  group: oz-erp-edge-infrastructure
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  audit-or-rotate:
    runs-on: ubuntu-24.04
    environment: production-infrastructure
    timeout-minutes: 10
    env:
      PROJECT_ID: ozotec-erp
      INVOKER: oz-erp-edge-invoker@ozotec-erp.iam.gserviceaccount.com
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - name: Validate Google Cloud federation configuration
        shell: bash
        env:
          GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          GCP_DEPLOYER_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
        run: |
          set -euo pipefail
          [[ -n "$GCP_WORKLOAD_IDENTITY_PROVIDER" ]] || { echo 'Repository variable GCP_WORKLOAD_IDENTITY_PROVIDER is required.' >&2; exit 1; }
          [[ -n "$GCP_DEPLOYER_SERVICE_ACCOUNT" ]] || { echo 'Repository variable GCP_DEPLOYER_SERVICE_ACCOUNT is required.' >&2; exit 1; }
          [[ "$GCP_WORKLOAD_IDENTITY_PROVIDER" =~ ^projects/[0-9]+/locations/global/workloadIdentityPools/[A-Za-z0-9._-]+/providers/[A-Za-z0-9._-]+$ ]] || { echo 'Repository variable GCP_WORKLOAD_IDENTITY_PROVIDER is not a full provider resource name.' >&2; exit 1; }
          [[ "$GCP_DEPLOYER_SERVICE_ACCOUNT" =~ ^[A-Za-z0-9._-]+@ozotec-erp\.iam\.gserviceaccount\.com$ ]] || { echo 'Repository variable GCP_DEPLOYER_SERVICE_ACCOUNT must belong to ozotec-erp.' >&2; exit 1; }
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38
        with:
          node-version: "24"
          package-manager-cache: false
      - run: npm install --global wrangler@4.110.0
      - name: Enforce least-privilege invoker role
        run:
          gcloud run services add-iam-policy-binding oz-erp-api --project="$PROJECT_ID"
          --region=asia-south1 --member="serviceAccount:$INVOKER" --role=roles/run.invoker --quiet
      - name: Audit age or rotate on manual approval
        run: |
          set -euo pipefail
          oldest="$(gcloud iam service-accounts keys list --iam-account="$INVOKER" --managed-by=user --format='value(validAfterTime)' | sort | head -n1)"
          if [[ "${{ github.event_name }}" = schedule ]]; then
            test -z "$oldest" && { echo 'No user-managed Edge invocation key exists.' >&2; exit 1; }
            age_days=$(( ($(date +%s) - $(date -d "$oldest" +%s)) / 86400 ))
            test "$age_days" -lt 80 || { echo "Edge invocation key is $age_days days old; rotate before day 90." >&2; exit 1; }
            exit 0
          fi
          key_file="$(mktemp)"
          trap 'rm -f "$key_file"' EXIT
          gcloud iam service-accounts keys create "$key_file" --iam-account="$INVOKER" --project="$PROJECT_ID"
          base64 -w0 "$key_file" | wrangler secret put GCP_SERVICE_ACCOUNT_JSON_B64 --name oz-erp-edge
          cutoff="$(date -u -d '7 days ago' +%s)"
          gcloud iam service-accounts keys list --iam-account="$INVOKER" --managed-by=user --format='csv[no-heading](name.basename(),validAfterTime)' | while IFS=, read -r id created; do
            if [[ "$(date -d "$created" +%s)" -lt "$cutoff" ]]; then
              gcloud iam service-accounts keys delete "$id" --iam-account="$INVOKER" --quiet
            fi
          done
